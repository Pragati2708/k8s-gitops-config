apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: notification-service
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Pragati2708/k8s-gitops-config.git
    targetRevision: main
    path: notification-service

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: uat

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true