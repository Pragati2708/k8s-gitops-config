apiVersion: apps/v1
kind: Deployment
metadata:
  name: legacy
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: legacy
  template:
    metadata:
      labels:
        app: legacy
    spec:
      containers:
      - name: legacy
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        ports:
        - containerPort: 3000